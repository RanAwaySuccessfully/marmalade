name: Build Marmalade

on:
  workflow_dispatch:

jobs:
  ffmpeg:
    name: Build FFmpeg Plugin
    runs-on: ubuntu-latest
    container: debian:bookworm
    defaults:
      run:
        shell: bash
    strategy: 
      fail-fast: false
      matrix:
        environment: [4.4, 5.1, 6.1, 7.1, 8.1]
    steps:

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y git make gcc nasm yasm pkg-config

    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
    
    - name: Checkout FFmpeg submodule
      run: |
        git config --global --add safe.directory "*"
        git submodule update --init app/ffmpeg/ffmpeg

    - name: Build FFmpeg
      run: |
        cd app/ffmpeg/ffmpeg
        git checkout release/${{ matrix.environment }}
        cd ../
        ./build.sh
        cd ../../
    
    - name: Build FFmpeg Plugin
      run: |
        FFMPEG_MAJOR_VER=$(echo '${{ matrix.environment }}' | sed -E 's/\.[0-9]+//g')
        echo "FFMPEG_MAJOR_VER=$FFMPEG_MAJOR_VER" >> $GITHUB_ENV
        go build -tags ffmpeg_git -buildmode=plugin -v -o "ffmpeg${FFMPEG_MAJOR_VER}_plugin.so" ./app/ffmpeg

    - name: Export complete build
      uses: actions/upload-artifact@v7
      with:
        path: ffmpeg${{ env.FFMPEG_MAJOR_VER }}_plugin.so
        if-no-files-found: error
        retention-days: 1
        archive: false
        overwrite: true

  kalidokit:
    name: Build KalidoKit
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl
    
    - name: Install Bun
      run: curl -fsSL https://bun.com/install | bash

    - name: Build KalidoKit
      run: |
        source /home/runner/.bash_profile
        cd app/kalidokit
        ./build.sh

    - name: Export complete build
      uses: actions/upload-artifact@v7
      with:
        name: kalidokit
        path: app/kalidokit/kalidokit-bin
        if-no-files-found: error
        retention-days: 1
        compression-level: 1
        overwrite: true

  marmalade:
    name: Build Marmalade
    runs-on: ubuntu-latest
    container: debian:bookworm
    defaults:
      run:
        shell: bash
    steps:

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y libv4l-dev libgtk-3-dev libgtk-4-dev libgirepository1.0-dev
        apt-get install -y wget unzip git libavcodec-dev

    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - uses: actions/checkout@v7
      with:
        repository: 'RanAwaySuccessfully/gotk4'
        ref: '4.8'
        path: 'gotk4'

    - name: Set up gotk4 replacement
      run: |
        mv gotk4 ../
        go work init
        printf "\nreplace github.com/diamondburned/gotk4/pkg => ../gotk4/pkg\n\nuse ." >> go.work

    - name: Download libmediapipe.so + libopencv_*.so.414
      run: |
        wget https://github.com/RanAwaySuccessfully/mediapipe/releases/download/v0.10.35-lib/mediapipe.zip
        unzip mediapipe.zip -d lib/

    - name: Checkout MediaPipe submodule
      run: |
        git config --global --add safe.directory "*"
        git submodule update --init app/mediapipe/cc/mediapipe

    - name: Build libtoast.a
      run: |
        cd ./app/mediapipe/cc/
        make
        cd ../../../

    - name: Add new V4L2 headers
      run: |
        echo "deb http://deb.debian.org/debian bookworm-backports main" >> /etc/apt/sources.list
        apt update
        apt install -t bookworm-backports linux-libc-dev

    - name: Build MediaPipe sub-process
      run: go build -v -o mediapipe ./app/mediapipe

    - name: Build CMD version
      run: env CGO_ENABLED=0 go build -v -o marmalade ./app/cmd

    - name: Build GTK 4 version
      run: go build -v -o marmalade-gtk4 ./app/gtk4

    - name: Build GTK 3 version
      run: go build -v -o marmalade-gtk3 ./app/gtk3

    - name: Create distributable folder
      run: |
        mkdir dist
        mv -t dist lib config.json fourcc.json LICENSE marmalade marmalade-gtk3 marmalade-gtk4 mediapipe

    - name: Export complete build
      uses: actions/upload-artifact@v7
      with:
        name: marmalade
        path: dist
        if-no-files-found: error
        retention-days: 1
        compression-level: 1
        overwrite: true
